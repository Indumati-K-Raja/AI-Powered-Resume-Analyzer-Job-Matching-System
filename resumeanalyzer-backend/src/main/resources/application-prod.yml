spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:resumeanalyzer}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:4213}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

google:
  gemini:
    api-key: ${GEMINI_API_KEY:}
